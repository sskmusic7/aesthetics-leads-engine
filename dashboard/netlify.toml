[build]
  command = "npm install && npm run build"
  publish = "out"

[build.environment]
  NEXT_PUBLIC_API_URL = ""
  NODE_VERSION = "18"

# API proxy redirects to backend (solves mixed content HTTPS issue)
[[redirects]]
  from = "/api/*"
  to = "http://46.101.74.92:3001/api/:splat"
  status = 200
  force = true

# Health check proxy
[[redirects]]
  from = "/health"
  to = "http://46.101.74.92:3001/health"
  status = 200
  force = true

# Serve _next static files directly (CRITICAL: must come before catch-all)
[[redirects]]
  from = "/_next/*"
  to = "/_next/:splat"
  status = 200

# Catch-all redirect for SPA routing (must come AFTER _next rule)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
