<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinics - UK Aesthetics Lead Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #141414;
            --color-secondary: #1F1F25;
            --color-body: #74787C;
            --color-heading: #fff;
            --color-white: #fff;
            --color-success: #3EB75E;
            --color-border: #2A2A2A;
            --font-primary: "Hanken Grotesk", sans-serif;
        }

        body {
            font-family: var(--font-primary);
            background-color: var(--color-primary);
            color: var(--color-body);
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background-color: var(--color-secondary);
            border-bottom: 1px solid var(--color-border);
            padding: 20px 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-white);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: var(--color-body);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--color-white);
        }

        .nav-links a.active {
            color: var(--color-white);
        }

        main {
            padding: 40px 0;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--color-white);
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 16px;
            color: var(--color-body);
        }

        .action-bar {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border: 1px solid var(--color-border);
            background-color: var(--color-secondary);
            color: var(--color-white);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }

        .btn:hover {
            border-color: var(--color-white);
        }

        .btn-primary {
            background-color: var(--color-white);
            color: var(--color-primary);
            border-color: var(--color-white);
        }

        .btn-primary:hover {
            background-color: var(--color-secondary);
            color: var(--color-white);
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px 15px;
            border: 1px solid var(--color-border);
            background-color: var(--color-secondary);
            color: var(--color-white);
            font-size: 14px;
            min-width: 150px;
        }

        .clinics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .clinic-card {
            background-color: var(--color-secondary);
            border: 1px solid var(--color-border);
            padding: 25px;
            transition: border-color 0.3s;
        }

        .clinic-card:hover {
            border-color: var(--color-white);
        }

        .clinic-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .clinic-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-white);
            margin-bottom: 5px;
        }

        .clinic-location {
            font-size: 14px;
            color: var(--color-body);
        }

        .score-badge {
            padding: 5px 10px;
            background-color: var(--color-primary);
            border: 1px solid var(--color-border);
            font-size: 12px;
            font-weight: 500;
            color: var(--color-white);
        }

        .score-badge.high {
            border-color: var(--color-success);
            color: var(--color-success);
        }

        .score-badge.medium {
            border-color: #FF8F3C;
            color: #FF8F3C;
        }

        .clinic-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .detail-label {
            color: var(--color-body);
        }

        .detail-value {
            color: var(--color-white);
            font-weight: 500;
        }

        .clinic-actions {
            display: flex;
            gap: 10px;
        }

        .clinic-actions .btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 13px;
        }

        .loading-text {
            text-align: center;
            color: var(--color-body);
            padding: 60px 20px;
            font-size: 16px;
        }

        .error-message {
            background-color: rgba(255, 0, 3, 0.1);
            border: 1px solid #FF0003;
            color: #FF0003;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        footer {
            background-color: var(--color-secondary);
            border-top: 1px solid var(--color-border);
            padding: 20px 0;
            margin-top: 60px;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-text {
            font-size: 14px;
            color: var(--color-body);
        }

        .footer-brand {
            font-size: 14px;
            color: var(--color-white);
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .clinics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">UK Aesthetics Lead Engine</a>
                <nav class="nav-links">
                    <a href="index.html">Dashboard</a>
                    <a href="clinics.html" class="active">Clinics</a>
                    <a href="outreach.html">Outreach</a>
                    <a href="settings.html">Settings</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Clinics</h1>
                    <p class="page-subtitle">Manage discovered aesthetic clinics</p>
                </div>
                <div class="action-bar">
                    <a href="#" class="btn" onclick="exportClinics(); return false;">Export</a>
                    <a href="#" class="btn btn-primary" onclick="addClinic(); return false;">+ Add Clinic</a>
                </div>
            </div>

            <div id="error-container"></div>

            <div class="filters">
                <select class="filter-select" id="borough-filter">
                    <option value="">All Boroughs</option>
                    <option value="kensington">Kensington</option>
                    <option value="westminster">Westminster</option>
                    <option value="camden">Camden</option>
                    <option value="city">City of London</option>
                </select>
                <select class="filter-select" id="score-filter">
                    <option value="">All Scores</option>
                    <option value="high">High Priority</option>
                    <option value="medium">Medium Priority</option>
                    <option value="low">Low Priority</option>
                </select>
                <select class="filter-select" id="status-filter">
                    <option value="">All Status</option>
                    <option value="new">New</option>
                    <option value="contacted">Contacted</option>
                    <option value="pending">Pending</option>
                </select>
            </div>

            <div class="clinics-grid" id="clinics-grid">
                <div class="loading-text">Loading clinics...</div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-text">2024 UK Aesthetics Lead Engine. All rights reserved.</div>
                <div class="footer-brand">Powered by Playbook MPR</div>
            </div>
        </div>
    </footer>

    <script>
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://46.101.74.92:3001'
            : '';

        async function fetchClinics() {
            const clinicsGrid = document.getElementById('clinics-grid');
            const errorContainer = document.getElementById('error-container');

            try {
                const response = await fetch(`${API_BASE}/api/clinics?limit=50`);
                if (!response.ok) {
                    throw new Error('Failed to connect to backend');
                }

                const result = await response.json();
                const clinics = result.data || [];

                clinicsGrid.innerHTML = '';

                if (clinics.length > 0) {
                    clinics.forEach(clinic => {
                        // Get the most recent score if available
                        const latestScore = clinic.scores && clinic.scores.length > 0
                            ? clinic.scores[0].compositeScore
                            : null;

                        const score = latestScore || 0;
                        const scoreClass = score >= 70 ? 'high' : score >= 40 ? 'medium' : '';
                        const scoreLabel = score >= 70 ? 'High' : score >= 40 ? 'Medium' : 'Low';

                        // Get outreach status
                        const outreachStatus = clinic.outreachQueue && clinic.outreachQueue.length > 0
                            ? clinic.outreachQueue[0].status
                            : 'New';

                        const clinicCard = document.createElement('div');
                        clinicCard.className = 'clinic-card';
                        clinicCard.innerHTML = `
                            <div class="clinic-header">
                                <div>
                                    <div class="clinic-name">${clinic.name || 'Unknown Clinic'}</div>
                                    <div class="clinic-location">${clinic.borough || 'London'}${clinic.address ? ', ' + clinic.address : ''}</div>
                                </div>
                                <div class="score-badge ${scoreClass}">${scoreLabel}</div>
                            </div>
                            <div class="clinic-details">
                                <div class="detail-row">
                                    <span class="detail-label">Score</span>
                                    <span class="detail-value">${score}/100</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Status</span>
                                    <span class="detail-value">${outreachStatus}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Added</span>
                                    <span class="detail-value">${new Date(clinic.createdAt).toLocaleDateString()}</span>
                                </div>
                            </div>
                            <div class="clinic-actions">
                                <a href="#" class="btn">View Details</a>
                                <a href="outreach.html" class="btn btn-primary">Outreach</a>
                            </div>
                        `;
                        clinicsGrid.appendChild(clinicCard);
                    });
                } else {
                    clinicsGrid.innerHTML = `
                        <div class="loading-text">
                            No clinics found in the database. Start scraping to discover aesthetic clinics across London.
                        </div>
                    `;
                }

            } catch (error) {
                console.error('API Error:', error);
                errorContainer.innerHTML = `
                    <div class="error-message">
                        Unable to connect to backend. Please ensure the backend service is running at 46.101.74.92:3001
                    </div>
                `;
                clinicsGrid.innerHTML = '<div class="loading-text">Unable to load clinics</div>';
            }
        }

        // Export clinics
        function exportClinics() {
            alert('Exporting clinics data...');
            // This would trigger a real export
        }

        // Add clinic
        function addClinic() {
            alert('Opening clinic addition form...');
            // This would open a modal or navigate to clinic creation
        }

        // Filter changes
        document.getElementById('borough-filter')?.addEventListener('change', fetchClinics);
        document.getElementById('score-filter')?.addEventListener('change', fetchClinics);
        document.getElementById('status-filter')?.addEventListener('change', fetchClinics);

        // Load clinics on page load
        fetchClinics();

        // Refresh every 30 seconds
        setInterval(fetchClinics, 30000);
    </script>
</body>
</html>
