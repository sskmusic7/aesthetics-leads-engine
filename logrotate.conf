# PM2 Log Rotation Configuration
# Place in /etc/logrotate.d/pm2-sskmusic

/home/sskmusic/.pm2/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 sskmusic sskmusic
    size 100M
}

# Application-specific logs
/var/www/aesthetics-leads/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 www-data www-data
    size 100M
}