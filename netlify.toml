[build]
  command = "cd dashboard && npm install && npm run build"
  publish = "dashboard/out"

[build.environment]
  NEXT_PUBLIC_API_URL = ""
  NODE_VERSION = "18"

# API proxy redirects to backend (solves mixed content HTTPS issue)
[[redirects]]
  from = "/api/*"
  to = "http://46.101.74.92:3001/api/:splat"
  status = 200
  force = true

# Health check proxy
[[redirects]]
  from = "/health"
  to = "http://46.101.74.92:3001/health"
  status = 200
  force = true

# Ensure _next folder is served properly
[[redirects]]
  from = "/_next/*"
  to = "/_next/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
