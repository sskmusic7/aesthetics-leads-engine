[build]
  publish = "dashboard-simple"
  command = "echo 'Static HTML dashboard - no build needed'"

# API proxy redirects to backend (optional - if you want to connect to backend)
[[redirects]]
  from = "/api/*"
  to = "http://46.101.74.92:3001/api/:splat"
  status = 200
  force = true

# Health check proxy
[[redirects]]
  from = "/health"
  to = "http://46.101.74.92:3001/health"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"